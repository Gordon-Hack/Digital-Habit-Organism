<div style="width:100%; height:100vh; background:#050505; overflow:hidden; font-family:'FreeSans','Helvetica Neue',sans-serif; color:#fff; position:relative">
  <!-- 3D mount -->
  <div id="org-canvas" style="position:absolute; inset:0; z-index:1"></div>

  <!-- Overlay SVG diagram (pan/zoom via CSS transform) -->
  <div id="diagram-wrapper" style="position:absolute; inset:0; z-index:5; overflow:hidden">
    <svg id="diagram-svg" style="position:absolute; width:2000px; height:2000px; left:-500px; top:-500px"></svg>
  </div>

  <!-- Loading veil -->
  <div id="org-loading" style="position:absolute; inset:0; z-index:50; background:#050505; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; transition:opacity 0.6s">
    <div style="font-size:13px; letter-spacing:0.4em; color:#1F48FF; font-weight:bold; text-transform:uppercase">Initialising Organism</div>
    <div style="width:200px; height:2px; background:rgba(31,72,255,0.2); overflow:hidden">
      <div id="org-load-bar" style="width:30%; height:100%; background:#1F48FF; transition:width 0.3s"></div>
    </div>
  </div>

  <!-- Top-left identity -->
  <div style="position:absolute; top:28px; left:32px; z-index:20; pointer-events:none">
    <div style="font-size:11px; letter-spacing:0.35em; color:#1F48FF; font-weight:bold; text-transform:uppercase">Arc-GGD &middot; Bildende Kunst</div>
    <h1 style="font-size:30px; font-weight:bold; margin:6px 0 0; letter-spacing:-0.01em; line-height:0.95">DIGITAL<br>ORGANISM</h1>
    <div style="font-size:9px; color:#676767; letter-spacing:0.18em; margin-top:8px">SPECIMEN AT-ORG-01 &middot; HABIT-DRIVEN LIFEFORM</div>
  </div>

  <!-- Central readout (top center) -->
  <div style="position:absolute; top:32px; left:50%; transform:translateX(-50%); z-index:20; text-align:center; pointer-events:none">
    <div id="org-date" style="font-size:12px; letter-spacing:0.25em; color:#fff; font-weight:bold">—</div>
    <div style="display:flex; align-items:baseline; gap:14px; justify-content:center; margin-top:4px">
      <div id="org-wellbeing" style="font-size:42px; font-weight:bold; line-height:1; letter-spacing:-0.02em">—</div>
      <div id="org-momentum" style="font-size:16px; font-weight:bold">—</div>
    </div>
    <div style="font-size:10px; letter-spacing:0.3em; color:#676767; text-transform:uppercase; margin-top:2px">Vitality Index</div>
  </div>

  <!-- Timeline scrubber (bottom) -->
  <div style="position:absolute; bottom:0; left:0; right:0; z-index:20; background:linear-gradient(to top, rgba(5,5,5,0.95), rgba(5,5,5,0)); padding:40px 32px 24px">
    <div style="display:flex; align-items:center; gap:20px">
      <button id="play-btn" style="width:48px; height:48px; flex-shrink:0; background:#1F48FF; color:#fff; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center">▶</button>
      <div style="flex:1">
        <div style="display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.2em; color:#676767; text-transform:uppercase; margin-bottom:8px">
          <span>2017</span>
          <span id="timeline-label" style="color:#1F48FF; font-weight:bold">WEEK —</span>
          <span>2026</span>

        <input id="timeline" type="range" min="0" max="449" value="449" step="1" style="width:100%; height:4px; -webkit-appearance:none; appearance:none; background:rgba(31,72,255,0.25); outline:none; cursor:pointer">

  <!-- Popup modal -->
  <div id="popup-modal" style="position:fixed; inset:0; background:rgba(5,5,5,0.7); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(2px)">

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this.mode = 'organism';
    this.current = 449;
    this.display = 449;
    this.playing = false;
    this.speed = 1;
    this.speeds = [1, 2, 4, 8];
    this.lastT = performance.now();
    this.t = 0;
    
    // Pan/zoom state
    this.panX = 0;
    this.panY = 0;
    this.zoom = 1;
    this.isDragging = false;
    this.dragStart = { x: 0, y: 0 };
    this.dragDistance = 0;
    
    this._waitForLibs();
  }

  _waitForLibs() {
    let tries = 0;
    const bar = document.getElementById('org-load-bar');
    const check = () => {
      tries++;
      if (bar) bar.style.width = Math.min(90, 30 + tries * 4) + '%';
      const ok = window.THREE && window.__ORGANISM_DATA;
      if (ok) { this._init(); return; }
      if (tries > 120) { console.error('Libs failed'); return; }
      setTimeout(check, 80);
    };
    check();
  }

  _init() {
    this.data = window.__ORGANISM_DATA;
    this.habits = this.data.habits;
    this.weeks = this.data.weeks;
    this._buildScene();
    this._buildDiagram();
    this._bindControls();
    const bar = document.getElementById('org-load-bar');
    if (bar) bar.style.width = '100%';
    const veil = document.getElementById('org-loading');
    if (veil) { veil.style.opacity = '0'; setTimeout(() => veil.style.display = 'none', 600); }
    this._animate();
  }

  // ========== DIAGRAM (SVG) ==========
  _buildDiagram() {
    this.orbMap = {};
    const svg = document.getElementById('diagram-svg');
    svg.setAttribute('viewBox', '0 0 2000 2000');
    
    const cx = 1000, cy = 1000; // center
    
    // Create orb data structure
    const dopamine = [
      'F Taschen', '2 Coffees', '1 C Or Few', 'Vale', 'Drinking', 'OC', 'W', '1 Coffee'
    ];
    const wellness = ['Abs', 'Medi', 'Yoga', 'Pup', 'Exercise'];
    const housekeeping = [
      { name: 'Tidiness', y: -180 },
      { name: '9.30', y: -130 },
      { name: '1 PFS', y: -80 },
      { name: 'Reasonable Bed Time', y: -30 },
      { name: 'Diligencia', y: 50 },
      { name: 'Plan the Day', y: 120 }
    ];
    const output = [
      { name: '30 min Reading', y: -140 },
      { name: '1 Creative Action', y: -70 },
      { name: 'Social Expansion', y: 0 },
      { name: 'Morning RDH', y: 80 }
    ];
    const enlightenment = [
      { name: 'Keep the Faith', y: -60 },
      { name: 'Power. Strength...', y: 0 },
      { name: 'Great Day', y: 60 }
    ];
    
    // Central orb
    this._createOrb(svg, cx, cy, 'CORE', '#1F48FF', 24, { type: 'center' });
    
    // Dopamine cluster (top-left)
    const doppx = cx - 350;
    const doppy = cy - 320;
    dopamine.forEach((name, i) => {
      const angle = (Math.PI * 2 * i) / dopamine.length;
      const x = doppx + Math.cos(angle) * 100;
      const y = doppy + Math.sin(angle) * 100;
      this._createOrb(svg, x, y, name, '#4f7bff', 18, { cluster: 'DOPAMINE' });
    });
    
    // Wellness cluster (top-right)
    const wellx = cx + 350;
    const welly = cy - 320;
    wellness.forEach((name, i) => {
      const angle = (Math.PI * 2 * i) / wellness.length;
      const x = wellx + Math.cos(angle) * 90;
      const y = welly + Math.sin(angle) * 90;
      this._createOrb(svg, x, y, name, '#4f7bff', 18, { cluster: 'WELLNESS' });
    });
    
    // Housekeeping stack (left)
    housekeeping.forEach(item => {
      this._createOrb(svg, cx - 350, cy + item.y, item.name, '#4f7bff', 18, { stack: 'HOUSEKEEPING' });
    });
    
    // Output stack (right)
    output.forEach(item => {
      this._createOrb(svg, cx + 350, cy + item.y, item.name, '#4f7bff', 18, { stack: 'OUTPUT' });
    });
    
    // Enlightenment stack (bottom)
    enlightenment.forEach(item => {
      this._createOrb(svg, cx, cy + 400 + item.y, item.name, '#4f7bff', 18, { stack: 'ENLIGHTENMENT' });
    });
    
    // Draw cluster boundaries
    this._drawClusterBoundaries(svg, cx, cy, doppx, doppy, wellx, welly);
  }

  _createOrb(svg, x, y, label, color, radius, meta) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'orb');
    g.setAttribute('data-label', label);
    
    // Glow
    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    glow.setAttribute('cx', x);
    glow.setAttribute('cy', y);
    glow.setAttribute('r', radius + 8);
    glow.setAttribute('fill', color);
    glow.setAttribute('opacity', '0.15');
    
    // Orb
    const orb = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    orb.setAttribute('cx', x);
    orb.setAttribute('cy', y);
    orb.setAttribute('r', radius);
    orb.setAttribute('fill', color);
    orb.setAttribute('class', 'orb-circle');
    
    // Label
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', x);
    text.setAttribute('y', y + radius + 30);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', '16');
    text.setAttribute('font-weight', 'bold');
    text.setAttribute('fill', '#fff');
    text.textContent = label;
    
    g.appendChild(glow);
    g.appendChild(orb);
    g.appendChild(text);
    g.style.cursor = 'pointer';
    g.style.transition = 'opacity 0.2s';
    
    g.addEventListener('click', () => this._showPopup(label, meta));
    g.addEventListener('mouseenter', () => {
      glow.setAttribute('opacity', '0.3');
      orb.setAttribute('stroke', '#fff');
      orb.setAttribute('stroke-width', '2');
    });
    g.addEventListener('mouseleave', () => {
      glow.setAttribute('opacity', '0.15');
      orb.removeAttribute('stroke');
    });
    
    document.getElementById('diagram-svg').appendChild(g);
    this.orbMap[label] = { x, y, ...meta };
  }

  _drawClusterBoundaries(svg, cx, cy, doppx, doppy, wellx, welly) {
    // Dopamine circle
    const dc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dc.setAttribute('cx', doppx);
    dc.setAttribute('cy', doppy);
    dc.setAttribute('r', 130);
    dc.setAttribute('fill', 'none');
    dc.setAttribute('stroke', 'rgba(31,72,255,0.15)');
    dc.setAttribute('stroke-width', '2');
    svg.appendChild(dc);
    
    // Wellness circle
    const wc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    wc.setAttribute('cx', wellx);
    wc.setAttribute('cy', welly);
    wc.setAttribute('r', 120);
    wc.setAttribute('fill', 'none');
    wc.setAttribute('stroke', 'rgba(31,72,255,0.15)');
    wc.setAttribute('stroke-width', '2');
    svg.appendChild(wc);
    
    // Antagonism arrow
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', doppx + 130);
    line.setAttribute('y1', doppy);
    line.setAttribute('x2', wellx - 130);
    line.setAttribute('y2', welly);
    line.setAttribute('stroke', 'rgba(31,72,255,0.3)');
    line.setAttribute('stroke-width', '2');
    svg.appendChild(line);
    
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy - 350);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-size', '14');
    text.setAttribute('font-weight', 'bold');
    text.setAttribute('fill', 'rgba(31,72,255,0.4)');
    text.textContent = '⟷ ANTAGONISM ⟷';
    svg.appendChild(text);
  }

  _showPopup(label, meta) {
    const modal = document.getElementById('popup-modal');
    const title = document.getElementById('popup-title');
    const body = document.getElementById('popup-body');
    
    title.textContent = label.toUpperCase();
    
    if (meta.type === 'center') {
      body.innerHTML = `
        <div style="margin-bottom:16px">
          <div style="font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#676767; margin-bottom:8px">System Status</div>
          <div style="background:rgba(31,72,255,0.1); padding:12px; border-left:2px solid #1F48FF">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px">
              <span>Vitality</span>
              <span style="color:#00ff88; font-weight:bold">${Math.round(this.weeks[Math.round(this.display)].w * 100)}%</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px">
              <span>Momentum</span>
              <span style="color:#1F48FF; font-weight:bold">Steady</span>
            </div>
            <div style="display:flex; justify-content:space-between">
              <span>Clusters</span>
              <span style="color:#ff9900; font-weight:bold">5 Active</span>
            </div>
          </div>
        </div>
      `;
    } else {
      body.innerHTML = `
        <div style="margin-bottom:16px">
          <div style="font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#676767; margin-bottom:8px">Habit Score</div>
          <div style="font-size:28px; font-weight:bold; color:#1F48FF">${Math.round(Math.random() * 100)}%</div>
        </div>
        <div style="font-size:10px; color:#676767">
          ${meta.cluster ? 'Cluster: ' + meta.cluster : ''}
          ${meta.stack ? 'Stack: ' + meta.stack : ''}
        </div>
      `;
    }
    
    modal.style.display = 'flex';
  }

  // ========== CONTROLS ==========
  _bindControls() {
    const tl = document.getElementById('timeline');
    tl.oninput = (e) => { this.current = +e.target.value; this.playing = false; this._syncPlayBtn(); };
    document.getElementById('play-btn').onclick = () => {
      this.playing = !this.playing;
      if (this.playing && this.current >= 449) this.current = 0;
      this._syncPlayBtn();
    };
    document.getElementById('speed-label').onclick = () => {
      const i = this.speeds.indexOf(this.speed);
      this.speed = this.speeds[(i+1)%this.speeds.length];
      document.getElementById('speed-label').textContent = this.speed + '× SPEED';
    };
    
    // Pan/zoom
    const wrapper = document.getElementById('diagram-wrapper');
    const svg = document.getElementById('diagram-svg');
    wrapper.addEventListener('mousedown', (e) => { this.isDragging = true; this.dragStart = { x: e.clientX, y: e.clientY }; this.dragDistance = 0; });
    wrapper.addEventListener('mousemove', (e) => {
      if (!this.isDragging) return;
      const dx = e.clientX - this.dragStart.x;
      const dy = e.clientY - this.dragStart.y;
      this.dragDistance += Math.abs(dx) + Math.abs(dy);
      this.panX += dx;
      this.panY += dy;
      this.dragStart = { x: e.clientX, y: e.clientY };
      svg.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoom})`;
    });
    wrapper.addEventListener('mouseup', () => { this.isDragging = false; });
    wrapper.addEventListener('mouseleave', () => { this.isDragging = false; });
    wrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      this.zoom *= delta;
      this.zoom = Math.max(0.5, Math.min(3, this.zoom));
      svg.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoom})`;
    });
    
    document.getElementById('popup-close').onclick = () => { document.getElementById('popup-modal').style.display = 'none'; };
    window.addEventListener('resize', () => this._resize());
  }

  _syncPlayBtn() {
    document.getElementById('play-btn').innerHTML = this.playing ? '⏸' : '▶';
  }

  // ========== THREE.JS SCENE ==========
  _buildScene() {
    const mount = document.getElementById('org-canvas');
    const W = mount.clientWidth, H = mount.clientHeight;
    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x050505, 0.025);
    this.camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
    this.camera.position.set(0, 0, 9);
    this.renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(W, H);
    this.renderer.setClearColor(0x050505, 1);
    mount.appendChild(this.renderer.domElement);

    this.coreGroup = new THREE.Group();
    this.nodeGroup = new THREE.Group();
    this.scene.add(this.coreGroup);
    this.scene.add(this.nodeGroup);

    this._buildCore();
    this._buildNodes();
    this._buildParticles();

    this.composer = new THREE.EffectComposer(this.renderer);
    this.composer.addPass(new THREE.RenderPass(this.scene, this.camera));
    this.bloom = new THREE.UnrealBloomPass(new THREE.Vector2(W,H), 1.1, 0.55, 0.2);
    this.composer.addPass(this.bloom);
    this.composer.setSize(W, H);
  }

  _coreShaders() {
    const vert = `
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
    float snoise(vec3 v) {
      const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
      const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
      vec3 i = floor(v + dot(v, C.yyy));
      vec3 x0 = v - i + dot(i, C.xxx);
      vec3 g = step(x0.yzx, x0.xyz);
      vec3 l = 1.0 - g;
      vec3 i1 = min(g.xyz, l.zxy);
      vec3 i2 = max(g.xyz, l.zxy);
      vec3 x1 = x0 - i1 + C.xxx;
      vec3 x2 = x0 - i2 + C.yyy;
      vec3 x3 = x0 - D.yyy;
      i = mod289(i);
      vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
      float n_ = 0.142857142857;
      vec3 ns = n_ * D.wyz - D.xzx;
      vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
      vec4 x_ = floor(j * ns.z);
      vec4 y_ = floor(j - 7.0 * x_);
      vec4 x = x_ * ns.x + ns.yyyy;
      vec4 y = y_ * ns.x + ns.yyyy;
      vec4 h = 1.0 - abs(x) - abs(y);
      vec4 b0 = vec4(x.xy, y.xy);
      vec4 b1 = vec4(x.zw, y.zw);
      vec4 s0 = floor(b0) * 2.0 + 1.0;
      vec4 s1 = floor(b1) * 2.0 + 1.0;
      vec4 sh = -step(h, vec4(0.0));
      vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
      vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
      vec3 p0 = vec3(a0.xy, h.x);
      vec3 p1 = vec3(a0.zw, h.y);
      vec3 p2 = vec3(a1.xy, h.z);
      vec3 p3 = vec3(a1.zw, h.w);
      vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
      p0 *= norm.x;
      p1 *= norm.y;
      p2 *= norm.z;
      p3 *= norm.w;
      vec4 m = max(0.6 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
      m = m * m;
      return 42.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
    }
    uniform float uTime;
    uniform float uInflate;
    uniform float uTurb;
    uniform float uSpike;
    varying float vDisp;
    varying vec3 vNormal;
    varying vec3 vView;
    void main() {
      vec3 pos = position;
      float n1 = snoise(normal * 1.4 + uTime * 0.15);
      float n2 = snoise(normal * 3.2 - uTime * 0.25);
      float n3 = snoise(normal * 6.5 + uTime * 0.4);
      float disp = (n1 * 0.6 + n2 * 0.3 + n3 * 0.15) * uTurb;
      disp += pow(max(n2, 0.0), 3.0) * uSpike;
      float r = uInflate + disp;
      pos = normal * r;
      vDisp = disp;
      vNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vView = normalize(-mv.xyz);
      gl_Position = projectionMatrix * mv;
    }
    `;
    const frag = `
    uniform vec3 uColA;
    uniform vec3 uColB;
    uniform vec3 uRim;
    varying float vDisp;
    varying vec3 vNormal;
    varying vec3 vView;
    void main() {
      float fres = pow(1.0 - max(dot(vNormal, vView), 0.0), 2.5);
      vec3 base = mix(uColA, uColB, smoothstep(-0.3, 0.6, vDisp));
      vec3 col = base + uRim * fres * 1.6;
      gl_FragColor = vec4(col, 1.0);
    }
    `;
    return { vert, frag };
  }

  _buildCore() {
    const { vert, frag } = this._coreShaders();
    const geo = new THREE.IcosahedronGeometry(1, 6);
    this.coreUniforms = {
      uTime:{value:0}, uInflate:{value:1.6}, uTurb:{value:0.35}, uSpike:{value:0.2},
      uColA:{value:new THREE.Color(0x0a1a4a)}, uColB:{value:new THREE.Color(0x1F48FF)},
      uRim:{value:new THREE.Color(0x6f9bff)}
    };
    this.coreMat = new THREE.ShaderMaterial({ vertexShader:vert, fragmentShader:frag, uniforms:this.coreUniforms });
    this.core = new THREE.Mesh(geo, this.coreMat);
    this.coreGroup.add(this.core);
    const wgeo = new THREE.IcosahedronGeometry(1, 2);
    this.wireMat = new THREE.MeshBasicMaterial({ color:0x1F48FF, wireframe:true, transparent:true, opacity:0.12 });
    this.wire = new THREE.Mesh(wgeo, this.wireMat);
    this.coreGroup.add(this.wire);
  }

  _fib(n) {
    const pts = [];
    const phi = Math.PI*(3-Math.sqrt(5));
    for (let i=0;i<n;i++){
      const y=1-(i/(n-1))*2;
      const r=Math.sqrt(1-y*y);
      const th=phi*i;
      pts.push(new THREE.Vector3(Math.cos(th)*r, y, Math.sin(th)*r));
    }
    return pts;
  }

  _buildNodes() {
    this.nodeBase = this._fib(this.habits.length);
    this.nodes = this.nodeBase.map(() => {
      const g = new THREE.SphereGeometry(0.09, 16, 16);
      const m = new THREE.MeshBasicMaterial({ color:0x1F48FF });
      const mesh = new THREE.Mesh(g, m);
      const sg = new THREE.SphereGeometry(0.22, 16, 16);
      const sm = new THREE.MeshBasicMaterial({ color:0x1F48FF, transparent:true, opacity:0.25 });
      const glow = new THREE.Mesh(sg, sm);
      mesh.add(glow);
      this.nodeGroup.add(mesh);
      return { mesh, glow, mat:m, glowMat:sm };
    });
  }

  _buildParticles() {
    const N = 2600;
    const pos = new Float32Array(N*3);
    this.pSeed = new Float32Array(N);
    for (let i=0;i<N;i++){
      const r=2.4+Math.random()*3.6;
      const th=Math.random()*Math.PI*2;
      const ph=Math.acos(Math.random()*2-1);
      pos[i*3]=Math.sin(ph)*Math.cos(th)*r;
      pos[i*3+1]=Math.cos(ph)*r;
      pos[i*3+2]=Math.sin(ph)*Math.sin(th)*r;
      this.pSeed[i]=Math.random()*1000;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    this.pPos = pos;
    this.pBase = pos.slice(0);
    this.pMat = new THREE.PointsMaterial({
      color:0x4f7bff, size:0.035, transparent:true, opacity:0.55,
      blending:THREE.AdditiveBlending, depthWrite:false
    });
    this.particles = new THREE.Points(geo, this.pMat);
    this.scene.add(this.particles);
  }

  _stateColors(w, mom) {
    let a, b, rim;
    if (mom > 0.012) { a=0x06251c; b=0x00ff88; rim=0x7dffc0; }
    else if (mom < -0.012) { a=0x2a0512; b=0xff0055; rim=0xff6b97; }
    else { a=0x0a1a4a; b=0x1F48FF; rim=0x6f9bff; }
    return { a:new THREE.Color(a), b:new THREE.Color(b), rim:new THREE.Color(rim) };
  }

  // ========== ANIMATION LOOP ==========
  _animate() {
    this._raf = requestAnimationFrame(() => this._animate());
    const now = performance.now();
    const dt = Math.min((now - this.lastT)/1000, 0.05);
    this.lastT = now;
    this.t += dt;

    if (this.playing) {
      this.current += dt * 7 * this.speed;
      if (this.current >= 449) {
        this.current = 449;
        this.playing = false;
        this._syncPlayBtn();
      }
      document.getElementById('timeline').value = Math.round(this.current);
    }

    this.display += (this.current - this.display) * Math.min(1, dt*8);
    const idx = Math.max(0, Math.min(449, this.display));
    const i0 = Math.floor(idx);
    const i1 = Math.min(449, i0+1);
    const f = idx - i0;
    const wk0 = this.weeks[i0];
    const wk1 = this.weeks[i1];
    const w = wk0.w + (wk1.w - wk0.w)*f;
    const hvals = this.habits.map((_,k) => wk0.h[k] + (wk1.h[k]-wk0.h[k])*f);
    const prevW = this.weeks[Math.max(0,i0-1)].w;
    const mom = w - prevW;

    this._updateScene(w, mom, hvals);
    this._updateReadout(idx, w, mom, wk0.date);
    this.composer.render();
  }

  _updateScene(w, mom, hvals) {
    const t = this.t;
    const c = this._stateColors(w, mom);
    
    this.coreUniforms.uTime.value = t;
    this.coreUniforms.uInflate.value += (( 1.15 + w*0.95 ) - this.coreUniforms.uInflate.value)*0.06;
    this.coreUniforms.uTurb.value += (( 0.18 + Math.abs(mom)*6.0 + (1-w)*0.25 ) - this.coreUniforms.uTurb.value)*0.06;
    this.coreUniforms.uSpike.value += (( Math.max(0,-mom)*8.0 ) - this.coreUniforms.uSpike.value)*0.06;
    this.coreUniforms.uColA.value.lerp(c.a, 0.05);
    this.coreUniforms.uColB.value.lerp(c.b, 0.05);
    this.coreUniforms.uRim.value.lerp(c.rim, 0.05);
    
    const rot = 0.05 + Math.abs(mom)*1.2;
    this.coreGroup.rotation.y += rot*0.016;
    this.coreGroup.rotation.x = Math.sin(t*0.1)*0.15;
    this.wire.rotation.y -= 0.004;
    this.wire.rotation.z += 0.002;
    this.wire.scale.setScalar(this.coreUniforms.uInflate.value*0.62);

    const nodeR = this.coreUniforms.uInflate.value + 0.55;
    this.nodes.forEach((nd, k) => {
      const val = hvals[k];
      const base = this.nodeBase[k];
      const orbit = nodeR + 0.35 + Math.sin(t*0.6 + k)*0.06;
      const sp = base.clone().multiplyScalar(orbit);
      const ang = t*0.06;
      const x = sp.x*Math.cos(ang) - sp.z*Math.sin(ang);
      const z = sp.x*Math.sin(ang) + sp.z*Math.cos(ang);
      nd.mesh.position.set(x, sp.y, z);
      
      const sc = 0.5 + val*1.2;
      nd.mesh.scale.setScalar(sc * (0.9 + Math.sin(t*2+k)*0.08));
      
      let col;
      if (val > 0.7) col = new THREE.Color(0x00ff88);
      else if (val > 0.45) col = new THREE.Color(0x1F48FF);
      else if (val > 0.2) col = new THREE.Color(0xffb800);
      else col = new THREE.Color(0xff3355);
      nd.mat.color.lerp(col, 0.1);
      nd.glowMat.color.copy(nd.mat.color);
      nd.glowMat.opacity = 0.12 + val*0.3;
    });

    for (let i=0;i<this.pSeed.length;i++){
      const bx=this.pBase[i*3];
      const by=this.pBase[i*3+1];
      const bz=this.pBase[i*3+2];
      const s=this.pSeed[i];
      const ang=t*0.25*(0.3+(s%10)/20);
      let x=bx*Math.cos(ang)-bz*Math.sin(ang);
      let y=by+Math.sin(t*0.5+s)*0.25;
      let z=bx*Math.sin(ang)+bz*Math.cos(ang);
      this.pPos[i*3]=x;
      this.pPos[i*3+1]=y;
      this.pPos[i*3+2]=z;
    }
    this.particles.geometry.attributes.position.needsUpdate = true;
    this.particles.rotation.y += 0.0004;
    this.pMat.color.lerp(c.b, 0.05);
    this.pMat.opacity += ((0.5) - this.pMat.opacity)*0.08;
    this.pMat.size += ((0.032) - this.pMat.size)*0.08;

    this.bloom.strength += ((0.7 + w*0.9) - this.bloom.strength)*0.05;
  }

  _updateReadout(idx, w, mom, date) {
    const wb = document.getElementById('org-wellbeing');
    if (wb) wb.textContent = Math.round(w*100) + '%';
    const md = document.getElementById('org-momentum');
    if (md) {
      const pct = (mom*100);
      const up = pct >= 0;
      md.textContent = (up?'▲ +':'▼ ') + pct.toFixed(1);
      md.style.color = Math.abs(pct)<1.2 ? '#1F48FF' : (up ? '#00ff88' : '#ff3355');
    }
    const dd = document.getElementById('org-date');
    if (dd) dd.textContent = 'WEEK OF ' + date;
    const tlab = document.getElementById('timeline-label');
    if (tlab) tlab.textContent = 'WEEK ' + (Math.round(idx)+1) + ' / 450';
  }

  _resize() {
    if (!this.renderer) return;
    const mount = document.getElementById('org-canvas');
    const W = mount.clientWidth, H = mount.clientHeight;
    this.camera.aspect = W/H;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(W,H);
    this.composer.setSize(W,H);
    this.bloom.setSize(W,H);
  }

  componentWillUnmount() {
    cancelAnimationFrame(this._raf);
  }

  renderVals() { return {}; }
}

</script>
</body>
</html>
