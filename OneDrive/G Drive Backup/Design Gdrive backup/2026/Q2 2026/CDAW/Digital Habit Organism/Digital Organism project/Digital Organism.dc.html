<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; height:100vh; background:#050505; overflow:hidden; font-family:'FreeSans','Helvetica Neue',sans-serif; color:#fff; position:relative">
  <helmet>
    <link rel="stylesheet" href="_ds/arc-ggd-design-system-86c91d52-e919-45b8-b8fc-6a822a8599d9/tokens/fonts.css">
    <script src="organism-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  </helmet>

  <!-- 3D mount -->
  <div id="org-canvas" style="position:absolute; inset:0; z-index:1"></div>

  <!-- Loading veil -->
  <div id="org-loading" style="position:absolute; inset:0; z-index:50; background:#050505; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; transition:opacity 0.6s">
    <div style="font-size:13px; letter-spacing:0.4em; color:#1F48FF; font-weight:bold; text-transform:uppercase">Initialising Organism</div>
    <div style="width:200px; height:2px; background:rgba(31,72,255,0.2); overflow:hidden">
      <div id="org-load-bar" style="width:30%; height:100%; background:#1F48FF; transition:width 0.3s"></div>
    </div>
  </div>

  <!-- Top-left identity -->
  <div style="position:absolute; top:28px; left:32px; z-index:20; pointer-events:none">
    <div style="font-size:11px; letter-spacing:0.35em; color:#1F48FF; font-weight:bold; text-transform:uppercase">Arc-GGD &middot; Bildende Kunst</div>
    <h1 style="font-size:30px; font-weight:bold; margin:6px 0 0; letter-spacing:-0.01em; line-height:0.95">DIGITAL<br>ORGANISM</h1>
    <div style="font-size:9px; color:#676767; letter-spacing:0.18em; margin-top:8px">SPECIMEN AT-ORG-01 &middot; HABIT-DRIVEN LIFEFORM</div>
  </div>

  <!-- Mode selector (top-right) -->
  <div style="position:absolute; top:28px; right:32px; z-index:20; display:flex; flex-direction:column; gap:8px; align-items:flex-end">
    <div style="font-size:10px; letter-spacing:0.3em; color:#676767; text-transform:uppercase; margin-bottom:2px">Visual State</div>
    <div id="mode-buttons" style="display:flex; gap:6px"></div>
  </div>

  <!-- Central readout (top center) -->
  <div style="position:absolute; top:32px; left:50%; transform:translateX(-50%); z-index:20; text-align:center; pointer-events:none">
    <div id="org-date" style="font-size:12px; letter-spacing:0.25em; color:#fff; font-weight:bold">—</div>
    <div style="display:flex; align-items:baseline; gap:14px; justify-content:center; margin-top:4px">
      <div id="org-wellbeing" style="font-size:42px; font-weight:bold; line-height:1; letter-spacing:-0.02em">—</div>
      <div id="org-momentum" style="font-size:16px; font-weight:bold">—</div>
    </div>
    <div style="font-size:10px; letter-spacing:0.3em; color:#676767; text-transform:uppercase; margin-top:2px">Vitality Index</div>
  </div>

  <!-- Habit readout (left column) -->
  <div style="position:absolute; left:32px; top:144px; z-index:20; width:230px">
    <div style="font-size:10px; letter-spacing:0.3em; color:#676767; text-transform:uppercase; margin-bottom:7px; border-bottom:1px solid rgba(31,72,255,0.3); padding-bottom:5px">Organ Activity</div>
    <div id="habit-panel" style="display:flex; flex-direction:column; gap:3px"></div>
  </div>

  <!-- Timeline scrubber (bottom) -->
  <div style="position:absolute; bottom:0; left:0; right:0; z-index:20; background:linear-gradient(to top, rgba(5,5,5,0.95), rgba(5,5,5,0)); padding:40px 32px 24px">
    <div style="display:flex; align-items:center; gap:20px">
      <button id="play-btn" style="width:48px; height:48px; flex-shrink:0; background:#1F48FF; color:#fff; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center">&#9654;</button>
      <div style="flex:1">
        <div style="display:flex; justify-content:space-between; font-size:10px; letter-spacing:0.2em; color:#676767; text-transform:uppercase; margin-bottom:8px">
          <span>2017</span>
          <span id="timeline-label" style="color:#1F48FF; font-weight:bold">WEEK —</span>
          <span>2026</span>
        </div>
        <input id="timeline" type="range" min="0" max="449" value="449" step="1" style="width:100%; height:4px; -webkit-appearance:none; appearance:none; background:rgba(31,72,255,0.25); outline:none; cursor:pointer">
        <canvas id="spark" style="width:100%; height:40px; display:block; margin-top:8px"></canvas>
      </div>
      <div style="flex-shrink:0; text-align:right; width:120px">
        <div style="font-size:10px; letter-spacing:0.2em; color:#676767; text-transform:uppercase">Playback</div>
        <div id="speed-label" style="font-size:13px; font-weight:bold; color:#fff; cursor:pointer; margin-top:2px">1&times; SPEED</div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    this.mode = 'organism';
    this.current = 449;     // current week index (target)
    this.display = 449;     // smoothed displayed index
    this.playing = false;
    this.speed = 1;
    this.speeds = [1, 2, 4, 8];
    this.lastT = performance.now();
    this._waitForLibs();
  }

  _waitForLibs() {
    let tries = 0;
    const bar = document.getElementById('org-load-bar');
    const check = () => {
      tries++;
      if (bar) bar.style.width = Math.min(90, 30 + tries * 4) + '%';
      const ok = window.THREE && THREE.EffectComposer && THREE.UnrealBloomPass &&
                 THREE.RenderPass && THREE.ShaderPass && window.__ORGANISM_DATA;
      if (ok) { this._init(); return; }
      if (tries > 120) { console.error('Three.js failed to load'); return; }
      setTimeout(check, 80);
    };
    check();
  }

  _init() {
    this.data = window.__ORGANISM_DATA;
    this.habits = this.data.habits;
    this.weeks = this.data.weeks;
    this._buildUI();
    this._buildScene();
    this._bindControls();
    const bar = document.getElementById('org-load-bar');
    if (bar) bar.style.width = '100%';
    const veil = document.getElementById('org-loading');
    if (veil) { veil.style.opacity = '0'; setTimeout(() => veil.style.display = 'none', 600); }
    this._animate();
  }

  // ---------- DOM UI ----------
  _buildUI() {
    // Mode buttons
    const modes = [['organism','NUCLEUS'],['constellation','LATTICE'],['flux','FLUX']];
    const mb = document.getElementById('mode-buttons');
    mb.innerHTML = '';
    this.modeButtons = modes.map(([key,label]) => {
      const b = document.createElement('button');
      b.textContent = label;
      b.dataset.mode = key;
      b.style.cssText = 'padding:8px 14px;border:1px solid #1F48FF;font-weight:bold;font-size:11px;letter-spacing:0.15em;cursor:pointer;text-transform:uppercase;transition:background-color 0.12s,color 0.12s';
      b.onclick = () => this._setMode(key);
      mb.appendChild(b);
      return b;
    });
    this._syncModeButtons();

    // Habit panel rows
    const hp = document.getElementById('habit-panel');
    hp.innerHTML = '';
    this.habitRows = this.habits.map((h, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;border-left:2px solid #1F48FF;padding:1px 0 1px 10px;line-height:1.3';
      const label = document.createElement('div');
      label.style.cssText = 'flex:1;font-size:10px;letter-spacing:0.12em;font-weight:bold;text-transform:uppercase;color:#cfd4ff';
      label.textContent = h.label;
      const bar = document.createElement('div');
      bar.style.cssText = 'width:54px;height:4px;background:rgba(255,255,255,0.1);position:relative;overflow:hidden';
      const fill = document.createElement('div');
      fill.style.cssText = 'position:absolute;left:0;top:0;bottom:0;width:0%;background:#1F48FF;transition:width 0.2s,background 0.2s';
      bar.appendChild(fill);
      const val = document.createElement('div');
      val.style.cssText = 'width:34px;text-align:right;font-size:11px;font-weight:bold;font-variant-numeric:tabular-nums';
      row.appendChild(label); row.appendChild(bar); row.appendChild(val);
      hp.appendChild(row);
      return { row, label, fill, val };
    });

    this._drawSparkline();
  }

  _drawSparkline() {
    const cv = document.getElementById('spark');
    if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    cv.width = cv.offsetWidth * dpr; cv.height = 40 * dpr;
    const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
    const W = cv.offsetWidth, H = 40;
    ctx.clearRect(0,0,W,H);
    const n = this.weeks.length;
    ctx.beginPath();
    this.weeks.forEach((wk, i) => {
      const x = (i/(n-1))*W;
      const y = H - wk.w * H * 0.9 - 2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle = 'rgba(31,72,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    this._spark = { ctx, W, H, n };
    this._updateSparkCursor();
  }

  _updateSparkCursor() {
    if (!this._spark) return;
    this._drawSparkBase();
  }
  _drawSparkBase() {
    const { ctx, W, H, n } = this._spark;
    ctx.clearRect(0,0,W,H);
    ctx.beginPath();
    this.weeks.forEach((wk, i) => {
      const x = (i/(n-1))*W;
      const y = H - wk.w * H * 0.9 - 2;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.strokeStyle = 'rgba(31,72,255,0.45)'; ctx.lineWidth = 1; ctx.stroke();
    // cursor
    const cx = (this.display/(n-1))*W;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, H); ctx.stroke();
    const cw = this.weeks[Math.round(this.display)];
    const cy = H - cw.w * H * 0.9 - 2;
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
  }

  _bindControls() {
    const tl = document.getElementById('timeline');
    tl.oninput = (e) => { this.current = +e.target.value; this.playing = false; this._syncPlayBtn(); };
    document.getElementById('play-btn').onclick = () => {
      this.playing = !this.playing;
      if (this.playing && this.current >= 449) this.current = 0;
      this._syncPlayBtn();
    };
    document.getElementById('speed-label').onclick = () => {
      const i = this.speeds.indexOf(this.speed);
      this.speed = this.speeds[(i+1)%this.speeds.length];
      document.getElementById('speed-label').textContent = this.speed + '\u00d7 SPEED';
    };
    this._onResize = () => this._resize();
    window.addEventListener('resize', this._onResize);
  }
  _syncPlayBtn() {
    document.getElementById('play-btn').innerHTML = this.playing ? '&#10073;&#10073;' : '&#9654;';
  }

  _setMode(key) {
    this.mode = key;
    this._syncModeButtons();
  }

  _syncModeButtons() {
    if (!this.modeButtons) return;
    this.modeButtons.forEach(b => {
      const active = b.dataset.mode === this.mode;
      b.style.backgroundColor = active ? '#1F48FF' : 'rgba(0,0,0,0)';
      b.style.color = active ? '#ffffff' : '#8aa0ff';
    });
  }

  // ---------- THREE scene ----------
  _buildScene() {
    const mount = document.getElementById('org-canvas');
    const W = mount.clientWidth, H = mount.clientHeight;
    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x050505, 0.025);
    this.camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
    this.camera.position.set(0, 0, 9);
    this.renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(W, H);
    this.renderer.setClearColor(0x050505, 1);
    mount.appendChild(this.renderer.domElement);

    // groups
    this.coreGroup = new THREE.Group();
    this.nodeGroup = new THREE.Group();
    this.scene.add(this.coreGroup);
    this.scene.add(this.nodeGroup);

    this._buildCore();
    this._buildNodes();
    this._buildParticles();
    this._buildEdges();

    // bloom composer
    this.composer = new THREE.EffectComposer(this.renderer);
    this.composer.addPass(new THREE.RenderPass(this.scene, this.camera));
    this.bloom = new THREE.UnrealBloomPass(new THREE.Vector2(W,H), 1.1, 0.55, 0.2);
    this.composer.addPass(this.bloom);
    this.composer.setSize(W, H);
  }

  _coreShaders() {
    const noise = `
    vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
    vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C=vec2(1.0/6.0,1.0/3.0); const vec4 D=vec4(0.0,0.5,1.0,2.0);
      vec3 i=floor(v+dot(v,C.yyy)); vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz); vec3 l=1.0-g; vec3 i1=min(g.xyz,l.zxy); vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx; vec3 x2=x0-i2+C.yyy; vec3 x3=x0-D.yyy;
      i=mod289(i);
      vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
      float n_=0.142857142857; vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.0*floor(p*ns.z*ns.z); vec4 x_=floor(j*ns.z); vec4 y_=floor(j-7.0*x_);
      vec4 x=x_*ns.x+ns.yyyy; vec4 y=y_*ns.x+ns.yyyy; vec4 h=1.0-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy); vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.0+1.0; vec4 s1=floor(b1)*2.0+1.0; vec4 sh=-step(h,vec4(0.0));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy; vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x); vec3 p1=vec3(a0.zw,h.y); vec3 p2=vec3(a1.xy,h.z); vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x; p1*=norm.y; p2*=norm.z; p3*=norm.w;
      vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0); m=m*m;
      return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }`;
    const vert = noise + `
    uniform float uTime; uniform float uInflate; uniform float uTurb; uniform float uSpike;
    varying float vDisp; varying vec3 vNormal; varying vec3 vView;
    void main(){
      vec3 pos = position;
      float n1 = snoise(normal*1.4 + uTime*0.15);
      float n2 = snoise(normal*3.2 - uTime*0.25);
      float n3 = snoise(normal*6.5 + uTime*0.4);
      float disp = (n1*0.6 + n2*0.3 + n3*0.15) * uTurb;
      disp += pow(max(n2,0.0), 3.0) * uSpike;
      float r = uInflate + disp;
      pos = normal * r;
      vDisp = disp;
      vNormal = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(pos,1.0);
      vView = normalize(-mv.xyz);
      gl_Position = projectionMatrix * mv;
    }`;
    const frag = `
    uniform vec3 uColA; uniform vec3 uColB; uniform vec3 uRim;
    varying float vDisp; varying vec3 vNormal; varying vec3 vView;
    void main(){
      float fres = pow(1.0 - max(dot(vNormal, vView), 0.0), 2.5);
      vec3 base = mix(uColA, uColB, smoothstep(-0.3, 0.6, vDisp));
      vec3 col = base + uRim * fres * 1.6;
      gl_FragColor = vec4(col, 1.0);
    }`;
    return { vert, frag };
  }

  _buildCore() {
    const { vert, frag } = this._coreShaders();
    const geo = new THREE.IcosahedronGeometry(1, 6);
    this.coreUniforms = {
      uTime:{value:0}, uInflate:{value:1.6}, uTurb:{value:0.35}, uSpike:{value:0.2},
      uColA:{value:new THREE.Color(0x0a1a4a)}, uColB:{value:new THREE.Color(0x1F48FF)},
      uRim:{value:new THREE.Color(0x6f9bff)}
    };
    this.coreMat = new THREE.ShaderMaterial({ vertexShader:vert, fragmentShader:frag, uniforms:this.coreUniforms });
    this.core = new THREE.Mesh(geo, this.coreMat);
    this.coreGroup.add(this.core);

    // inner wireframe ghost
    const wgeo = new THREE.IcosahedronGeometry(1, 2);
    this.wireMat = new THREE.MeshBasicMaterial({ color:0x1F48FF, wireframe:true, transparent:true, opacity:0.12 });
    this.wire = new THREE.Mesh(wgeo, this.wireMat);
    this.coreGroup.add(this.wire);
  }

  _fib(n) {
    const pts = []; const phi = Math.PI*(3-Math.sqrt(5));
    for (let i=0;i<n;i++){ const y=1-(i/(n-1))*2; const r=Math.sqrt(1-y*y); const th=phi*i;
      pts.push(new THREE.Vector3(Math.cos(th)*r, y, Math.sin(th)*r)); }
    return pts;
  }

  _buildNodes() {
    this.nodeBase = this._fib(this.habits.length);
    this.nodes = this.nodeBase.map(() => {
      const g = new THREE.SphereGeometry(0.09, 16, 16);
      const m = new THREE.MeshBasicMaterial({ color:0x1F48FF });
      const mesh = new THREE.Mesh(g, m);
      // glow sprite
      const sg = new THREE.SphereGeometry(0.22, 16, 16);
      const sm = new THREE.MeshBasicMaterial({ color:0x1F48FF, transparent:true, opacity:0.25 });
      const glow = new THREE.Mesh(sg, sm);
      mesh.add(glow);
      this.nodeGroup.add(mesh);
      return { mesh, glow, mat:m, glowMat:sm };
    });
  }

  _buildEdges() {
    const n = this.nodes.length;
    const positions = [];
    this.edgePairs = [];
    for (let i=0;i<n;i++) for (let j=i+1;j<n;j++){
      if (this.nodeBase[i].distanceTo(this.nodeBase[j]) < 1.25){
        this.edgePairs.push([i,j]); positions.push(0,0,0, 0,0,0);
      }
    }
    const geo = new THREE.BufferGeometry();
    this.edgePos = new Float32Array(positions);
    geo.setAttribute('position', new THREE.BufferAttribute(this.edgePos, 3));
    this.edgeMat = new THREE.LineBasicMaterial({ color:0x1F48FF, transparent:true, opacity:0 });
    this.edges = new THREE.LineSegments(geo, this.edgeMat);
    this.nodeGroup.add(this.edges);
  }

  _buildParticles() {
    const N = 2600;
    const pos = new Float32Array(N*3);
    this.pSeed = new Float32Array(N);
    for (let i=0;i<N;i++){
      const r = 2.4 + Math.random()*3.6;
      const th = Math.random()*Math.PI*2; const ph = Math.acos(Math.random()*2-1);
      pos[i*3]=Math.sin(ph)*Math.cos(th)*r; pos[i*3+1]=Math.cos(ph)*r; pos[i*3+2]=Math.sin(ph)*Math.sin(th)*r;
      this.pSeed[i]=Math.random()*1000;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    this.pPos = pos; this.pBase = pos.slice(0);
    this.pMat = new THREE.PointsMaterial({ color:0x4f7bff, size:0.035, transparent:true, opacity:0.55, blending:THREE.AdditiveBlending, depthWrite:false });
    this.particles = new THREE.Points(geo, this.pMat);
    this.scene.add(this.particles);
  }

  // ---------- color mapping ----------
  _stateColors(w, mom) {
    // w: wellbeing 0..1, mom: momentum (-0.1..0.1 typical)
    let a, b, rim, accent;
    if (mom > 0.012) { a=0x06251c; b=0x00ff88; rim=0x7dffc0; accent=0x00ff88; }
    else if (mom < -0.012) { a=0x2a0512; b=0xff0055; rim=0xff6b97; accent=0xff0055; }
    else { a=0x0a1a4a; b=0x1F48FF; rim=0x6f9bff; accent=0x1F48FF; }
    return { a:new THREE.Color(a), b:new THREE.Color(b), rim:new THREE.Color(rim), accent:new THREE.Color(accent) };
  }

  // ---------- animation ----------
  _animate() {
    this._raf = requestAnimationFrame(() => this._animate());
    const now = performance.now();
    const dt = Math.min((now - this.lastT)/1000, 0.05);
    this.lastT = now;
    this.t = (this.t||0) + dt;

    if (this.playing) {
      this.current += dt * 7 * this.speed; // ~7 weeks/sec at 1x
      if (this.current >= 449) { this.current = 449; this.playing = false; this._syncPlayBtn(); }
      document.getElementById('timeline').value = Math.round(this.current);
    }
    // smooth display index
    this.display += (this.current - this.display) * Math.min(1, dt*8);
    const idx = Math.max(0, Math.min(449, this.display));
    const i0 = Math.floor(idx), i1 = Math.min(449, i0+1), f = idx - i0;
    const wk0 = this.weeks[i0], wk1 = this.weeks[i1];
    const w = wk0.w + (wk1.w - wk0.w)*f;
    const hvals = this.habits.map((_,k) => wk0.h[k] + (wk1.h[k]-wk0.h[k])*f);
    // momentum: wellbeing vs 1 week prior
    const prevW = this.weeks[Math.max(0,i0-1)].w;
    const mom = w - prevW;

    this._updateScene(w, mom, hvals);
    this._updateReadout(idx, w, mom, hvals, wk0.date);

    this.composer.render();
  }

  _updateScene(w, mom, hvals) {
    const t = this.t;
    const c = this._stateColors(w, mom);
    // core
    this.coreUniforms.uTime.value = t;
    this.coreUniforms.uInflate.value += (( 1.15 + w*0.95 ) - this.coreUniforms.uInflate.value)*0.06;
    this.coreUniforms.uTurb.value += (( 0.18 + Math.abs(mom)*6.0 + (1-w)*0.25 ) - this.coreUniforms.uTurb.value)*0.06;
    this.coreUniforms.uSpike.value += (( Math.max(0,-mom)*8.0 ) - this.coreUniforms.uSpike.value)*0.06;
    this.coreUniforms.uColA.value.lerp(c.a, 0.05);
    this.coreUniforms.uColB.value.lerp(c.b, 0.05);
    this.coreUniforms.uRim.value.lerp(c.rim, 0.05);
    const rot = 0.05 + Math.abs(mom)*1.2;
    this.coreGroup.rotation.y += rot*0.016*1.0;
    this.coreGroup.rotation.x = Math.sin(t*0.1)*0.15;
    this.wire.rotation.y -= 0.004; this.wire.rotation.z += 0.002;
    this.wire.scale.setScalar(this.coreUniforms.uInflate.value*0.62);

    // nodes
    const showNodes = this.mode !== 'flux';
    const nodeR = this.coreUniforms.uInflate.value + 0.55;
    this.nodes.forEach((nd, k) => {
      const val = hvals[k];
      const base = this.nodeBase[k];
      const orbit = nodeR + 0.35 + Math.sin(t*0.6 + k)*0.06;
      const sp = base.clone().multiplyScalar(orbit);
      // slow swirl
      const ang = t*0.06;
      const x = sp.x*Math.cos(ang) - sp.z*Math.sin(ang);
      const z = sp.x*Math.sin(ang) + sp.z*Math.cos(ang);
      nd.mesh.position.set(x, sp.y, z);
      const sc = 0.5 + val*1.2;
      nd.mesh.scale.setScalar(sc * (0.9 + Math.sin(t*2+k)*0.08));
      // color by value: low warm, high cyan/green, mid blue
      let col;
      if (val > 0.7) col = new THREE.Color(0x00ff88);
      else if (val > 0.45) col = new THREE.Color(0x1F48FF);
      else if (val > 0.2) col = new THREE.Color(0xffb800);
      else col = new THREE.Color(0xff3355);
      nd.mat.color.lerp(col, 0.1);
      nd.glowMat.color.copy(nd.mat.color);
      nd.glowMat.opacity = 0.12 + val*0.3;
      nd.mesh.visible = showNodes;
      this._nodeWorld = this._nodeWorld || [];
      this._nodeWorld[k] = nd.mesh.position;
    });
    this.nodeGroup.rotation.y = this.coreGroup.rotation.y*0.0; // nodes manage own swirl

    // edges (lattice mode)
    const wantEdges = this.mode === 'constellation';
    this.edgeMat.opacity += ((wantEdges?0.4:0) - this.edgeMat.opacity)*0.1;
    if (this.edgeMat.opacity > 0.01) {
      this.edgePairs.forEach((pr, e) => {
        const a = this.nodes[pr[0]].mesh.position, b = this.nodes[pr[1]].mesh.position;
        this.edgePos[e*6]=a.x; this.edgePos[e*6+1]=a.y; this.edgePos[e*6+2]=a.z;
        this.edgePos[e*6+3]=b.x; this.edgePos[e*6+4]=b.y; this.edgePos[e*6+5]=b.z;
      });
      this.edges.geometry.attributes.position.needsUpdate = true;
      this.edgeMat.color.lerp(c.accent, 0.05);
    }
    this.edges.visible = this.edgeMat.opacity > 0.01;

    // particles
    const fluxMode = this.mode === 'flux';
    const swirl = fluxMode ? 1.0 : 0.25;
    const pull = fluxMode ? 0.6 : 0.0;
    for (let i=0;i<this.pSeed.length;i++){
      const bx=this.pBase[i*3], by=this.pBase[i*3+1], bz=this.pBase[i*3+2];
      const s=this.pSeed[i];
      const ang = t*swirl*(0.3+ (s%10)/20);
      let x = bx*Math.cos(ang) - bz*Math.sin(ang);
      let z = bx*Math.sin(ang) + bz*Math.cos(ang);
      let y = by + Math.sin(t*0.5 + s)*0.25;
      if (pull>0){ const k=1-pull*0.5; x*=k; z*=k; }
      this.pPos[i*3]=x; this.pPos[i*3+1]=y; this.pPos[i*3+2]=z;
    }
    this.particles.geometry.attributes.position.needsUpdate = true;
    this.particles.rotation.y += 0.0004;
    this.pMat.color.lerp(c.accent, 0.05);
    this.pMat.opacity += ((fluxMode?0.85:0.5) - this.pMat.opacity)*0.08;
    this.pMat.size += ((fluxMode?0.05:0.032) - this.pMat.size)*0.08;

    // bloom strength breathes with vitality
    this.bloom.strength += ((0.7 + w*0.9) - this.bloom.strength)*0.05;
  }

  _updateReadout(idx, w, mom, hvals, date) {
    const wb = document.getElementById('org-wellbeing');
    if (wb) wb.textContent = Math.round(w*100) + '%';
    const md = document.getElementById('org-momentum');
    if (md) {
      const pct = (mom*100);
      const up = pct >= 0;
      md.textContent = (up?'\u25B2 +':'\u25BC ') + pct.toFixed(1);
      md.style.color = Math.abs(pct)<1.2 ? '#1F48FF' : (up ? '#00ff88' : '#ff3355');
    }
    const dd = document.getElementById('org-date');
    if (dd) dd.textContent = 'WEEK OF ' + date;
    const tlab = document.getElementById('timeline-label');
    if (tlab) tlab.textContent = 'WEEK ' + (Math.round(idx)+1) + ' / 450';

    if (this.habitRows) this.habitRows.forEach((r,k) => {
      const v = hvals[k]; const pct = Math.round(v*100);
      r.fill.style.width = pct + '%';
      r.val.textContent = pct + '%';
      let col;
      if (v>0.7) col='#00ff88'; else if (v>0.45) col='#1F48FF'; else if (v>0.2) col='#ffb800'; else col='#ff3355';
      r.fill.style.background = col; r.val.style.color = col;
    });

    if (this._frame===undefined) this._frame=0;
    if ((this._frame++ % 3)===0) this._drawSparkBase();
  }

  _resize() {
    if (!this.renderer) return;
    const mount = document.getElementById('org-canvas');
    const W = mount.clientWidth, H = mount.clientHeight;
    this.camera.aspect = W/H; this.camera.updateProjectionMatrix();
    this.renderer.setSize(W,H); this.composer.setSize(W,H); this.bloom.setSize(W,H);
    this._drawSparkline();
  }

  componentWillUnmount() {
    cancelAnimationFrame(this._raf);
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() { return {}; }
}

</script>
</body>
