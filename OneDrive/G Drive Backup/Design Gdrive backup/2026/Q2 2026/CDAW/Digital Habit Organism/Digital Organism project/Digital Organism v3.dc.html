<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {};

  componentDidMount() {
    this.playIdx = 449; this.dispIdx = 449;
    this.isPlaying = false; this.speed = 1; this.speeds = [1,2,4,8];
    this.lastT = performance.now(); this.t = 0;
    this.camX=0; this.tCamX=0; this.camY=0; this.tCamY=0; this.camZ=9; this.tCamZ=9;
    this.isDragging=false; this.dragFrom={x:0,y:0}; this.dragDist=0;
    this.colorMode='score';
    this._waitForLibs();
  }

  _waitForLibs() {
    let n=0;
    const bar=document.getElementById('v3-loadbar');
    const tick=()=>{ n++; if(bar) bar.style.width=Math.min(90,n*3)+'%';
      if(window.THREE&&window.__ORGANISM_DATA){this._init();return;}
      if(n<150) setTimeout(tick,80); };
    tick();
  }

  _init() {
    this.data=window.__ORGANISM_DATA; this.habits=this.data.habits; this.weeks=this.data.weeks;
    this.W=window.innerWidth; this.H=window.innerHeight;
    this._defineLayout(); this._buildScene(); this._bindControls(); this._drawSparkline();
    const bar=document.getElementById('v3-loadbar'); if(bar) bar.style.width='100%';
    const veil=document.getElementById('v3-veil');
    if(veil){veil.style.opacity='0';setTimeout(()=>veil.style.display='none',700);}
    // Double-RAF: recover if scene initialised before layout settled
    requestAnimationFrame(()=>requestAnimationFrame(()=>this._resize()));
    this._loop();
  }

  _defineLayout() {
    const V=(x,y,z=0)=>new THREE.Vector3(x,y,z);
    // habits[]: CREATE(0), EXERCISE(1), FAITH(2), GREAT DAY(3), TIDINESS(4),
    //           READING(5), SLEEP(6), PSC(7), [CBT(8) excluded], [REFLECT(9) excluded], RDH(10), SOCIAL(11)
    this.hLayout=[
      {i:0, g:'output',        b:V(3.55,  0.5)},    // CREATE (centre of row)
      {i:1, g:'wellness',      b:V(3.15,  2.25, 0.1)},// EXERCISE
      {i:2, g:'enlightenment', b:V(0.0,  -2.7)},    // FAITH
      {i:3, g:'enlightenment', b:V(0.0,  -4.1)},    // GREAT DAY
      {i:4, g:'housekeeping',  b:V(-4.0,  0.45)},   // TIDINESS (row pos 1)
      {i:5, g:'output',        b:V(2.7,   0.5)},    // READING (left of row)
      {i:6, g:'housekeeping',  b:V(-2.8,  0.45)},   // SLEEP (row pos 4)
      {i:7, g:'enlightenment', b:V(0.0,  -3.4)},    // PSC
      {i:10,g:'output',        b:V(3.55, -0.65)},   // RDH (below Create)
      {i:11,g:'output',        b:V(4.4,   0.5)},    // SOCIAL (right of row)
    ];
    this.gLayout=[
      // Dopamine ghosts — own CSV columns, h[20-25]
      {label:'F Taschen', g:'dopamine',    b:V(-2.8,  2.6,  0.2), i:20},
      {label:'2 Coffees', g:'dopamine',    b:V(-3.75, 2.7, -0.1), i:21},
      {label:'1 C Or Few',g:'dopamine',    b:V(-3.95, 1.75, 0.2), i:22},
      {label:'Vale',      g:'dopamine',    b:V(-2.6,  1.55,-0.2), i:25},
      {label:'Drinking',  g:'dopamine',    b:V(-3.15, 1.4,  0.1), i:23},
      {label:'W',         g:'dopamine',    b:V(-3.4,  2.85, 0.3), i:24},
      // Wellness ghosts — own CSV columns, h[12-19]
      {label:'Abs',       g:'wellness',    b:V(2.7,  2.5,  0.15), i:19},
      {label:'Medi',      g:'wellness',    b:V(3.82, 2.6, -0.1),  i:12},
      {label:'Yoga',      g:'wellness',    b:V(3.95, 1.8,  0.2),  i:18},
      {label:'Pup',       g:'wellness',    b:V(3.1,  1.5, -0.15), i:17},
      // Housekeeping row ghosts — own CSV columns
      {label:'9.30',         g:'housekeeping', b:V(-3.6, 0.45), i:13},
      {label:'1 PFS',        g:'housekeeping', b:V(-3.2, 0.45), i:14},
      // Housekeeping lower ghosts
      {label:'Diligencia',   g:'housekeeping', b:V(-3.4,-0.42), i:16},
      {label:'Plan the Day', g:'housekeeping', b:V(-3.4,-1.15), i:15}
    ];
  }

  // ============ SCENE ============

  _buildScene() {
    const mount=document.getElementById('v3-canvas');
    const rect=mount.getBoundingClientRect();
    const W=rect.width||mount.clientWidth||window.innerWidth||1280;
    const H=rect.height||mount.clientHeight||window.innerHeight||720;
    this.RW=W; this.RH=H;
    this.scene=new THREE.Scene(); this.scene.fog=new THREE.FogExp2(0x050505,0.012);
    this.camera=new THREE.PerspectiveCamera(50,W/H,0.1,100);
    this.camera.position.set(0,0,9);
    this.renderer=new THREE.WebGLRenderer({antialias:true});
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    this.renderer.setSize(W,H); this.renderer.setClearColor(0x050505,1);
    mount.appendChild(this.renderer.domElement);
    this.coreGrp=new THREE.Group(); this.nodeGrp=new THREE.Group(); this.ghostGrp=new THREE.Group();
    this.scene.add(this.coreGrp,this.nodeGrp,this.ghostGrp);
    this._buildCore(); this._buildNodes(); this._buildGhosts(); this._buildParticles(); this._buildAnnotCanvas();
    this.raycaster=new THREE.Raycaster();
    this.composer=new THREE.EffectComposer(this.renderer);
    this.composer.addPass(new THREE.RenderPass(this.scene,this.camera));
    this.bloom=new THREE.UnrealBloomPass(new THREE.Vector2(W,H),0.9,0.5,0.18);
    this.composer.addPass(this.bloom); this.composer.setSize(W,H);
  }

  _coreShaders() {
    const vert=`
    vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
    vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
    vec4 permute(vec4 x){return mod289(((x*34.)+1.)*x);}
    vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
    float snoise(vec3 v){
      const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);
      vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
      vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.-g;
      vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
      vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
      i=mod289(i);
      vec4 p=permute(permute(permute(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
      float n_=.142857142857;vec3 ns=n_*D.wyz-D.xzx;
      vec4 j=p-49.*floor(p*ns.z*ns.z);
      vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);
      vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;
      vec4 h=1.-abs(x)-abs(y);
      vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
      vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;
      vec4 sh=-step(h,vec4(0.));
      vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
      vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);
      vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
      vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
      p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
      vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
      m=m*m;return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
    }
    uniform float uTime;uniform float uInflate;uniform float uTurb;uniform float uSpike;
    varying float vDisp;varying vec3 vNormal;varying vec3 vView;
    void main(){
      vec3 pos=position;
      float n1=snoise(normal*1.4+uTime*.15);float n2=snoise(normal*3.2-uTime*.25);float n3=snoise(normal*6.5+uTime*.4);
      float disp=(n1*.6+n2*.3+n3*.15)*uTurb;disp+=pow(max(n2,0.),3.)*uSpike;
      pos=normal*(uInflate+disp);vDisp=disp;vNormal=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(pos,1.);vView=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;
    }`;
    const frag=`
    uniform vec3 uColA;uniform vec3 uColB;uniform vec3 uRim;
    varying float vDisp;varying vec3 vNormal;varying vec3 vView;
    void main(){
      float fres=pow(1.-max(dot(vNormal,vView),0.),2.5);
      vec3 base=mix(uColA,uColB,smoothstep(-.3,.6,vDisp));
      gl_FragColor=vec4(base+uRim*fres*1.6,1.);
    }`;
    return {vert,frag};
  }

  _buildCore() {
    const {vert,frag}=this._coreShaders();
    this.coreU={uTime:{value:0},uInflate:{value:1.25},uTurb:{value:0.3},uSpike:{value:0.15},
      uColA:{value:new THREE.Color(0x0a1a4a)},uColB:{value:new THREE.Color(0x1F48FF)},uRim:{value:new THREE.Color(0x6f9bff)}};
    this.coreMesh=new THREE.Mesh(new THREE.IcosahedronGeometry(1,6),new THREE.ShaderMaterial({vertexShader:vert,fragmentShader:frag,uniforms:this.coreU}));
    this.coreGrp.add(this.coreMesh);
    this.wireMesh=new THREE.Mesh(new THREE.IcosahedronGeometry(1,2),new THREE.MeshBasicMaterial({color:0x1F48FF,wireframe:true,transparent:true,opacity:0.1}));
    this.coreGrp.add(this.wireMesh);
  }

  _buildNodes() {
    this.clickables=[];
    this.nodes=this.hLayout.map((hl,k)=>{
      const mat=new THREE.MeshBasicMaterial({color:0x1F48FF});
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.15,20,20),mat);
      mesh.userData.nodeIdx=k;
      const gmat=new THREE.MeshBasicMaterial({color:0x1F48FF,transparent:true,opacity:0.15});
      // Smaller radius; glow is a sibling (not child) so we can scale it independently
      const glow=new THREE.Mesh(new THREE.SphereGeometry(0.22,16,16),gmat);
      glow.userData.nodeIdx=k;
      mesh.position.copy(hl.b); glow.position.copy(hl.b);
      this.nodeGrp.add(mesh); this.nodeGrp.add(glow);
      this.clickables.push(mesh,glow);
      return {mesh,mat,gmat,glow,hl,clickStart:-999,seed:k*7.3+2.1};
    });
  }

  _buildGhosts() {
    this.ghosts=this.gLayout.map((gl,k)=>{
      const mat=new THREE.MeshBasicMaterial({color:0x1F48FF});
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.13,16,16),mat);
      const gmat=new THREE.MeshBasicMaterial({color:0x1F48FF,transparent:true,opacity:0.11});
      // Smaller radius; sibling not child for independent scale control
      const glow=new THREE.Mesh(new THREE.SphereGeometry(0.20,12,12),gmat);
      mesh.userData.ghostIdx=k; glow.userData.ghostIdx=k;
      mesh.position.copy(gl.b); glow.position.copy(gl.b);
      this.ghostGrp.add(mesh); this.ghostGrp.add(glow);
      this.clickables.push(mesh,glow);
      return {mesh,mat,gmat,glow,gl,seed:k*5.7+11.3,clickStart:-999};
    });
  }

  _buildParticles() {
    const N=1800; const pos=new Float32Array(N*3); this.pSeed=new Float32Array(N);
    for(let i=0;i<N;i++){
      const r=3+Math.random()*5,th=Math.random()*Math.PI*2,ph=Math.acos(Math.random()*2-1);
      pos[i*3]=Math.sin(ph)*Math.cos(th)*r;pos[i*3+1]=Math.cos(ph)*r;pos[i*3+2]=Math.sin(ph)*Math.sin(th)*r;
      this.pSeed[i]=Math.random()*1000;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    this.pPos=pos;this.pBase=pos.slice();
    this.pMat=new THREE.PointsMaterial({color:0x4f7bff,size:0.038,transparent:true,opacity:0.4,blending:THREE.AdditiveBlending,depthWrite:false});
    this.particles=new THREE.Points(geo,this.pMat); this.scene.add(this.particles);
  }

  _buildAnnotCanvas() {
    const dpr=window.devicePixelRatio||1;
    this.annot=document.getElementById('v3-annot');
    this.annot.width=this.RW*dpr; this.annot.height=this.RH*dpr;
    this.annot.style.width=this.RW+'px'; this.annot.style.height=this.RH+'px';
    this.annotCtx=this.annot.getContext('2d'); this.annotCtx.scale(dpr,dpr);
  }

  // ============ CONTROLS ============

  _bindControls() {
    const $=id=>document.getElementById(id);
    const tl=$('v3-tl');
    tl.addEventListener('input',e=>{
      this.playIdx=+e.target.value;
      const pct=(this.playIdx/449)*100;
      tl.style.background=`linear-gradient(to right,rgba(31,72,255,0.6) ${pct}%,rgba(31,72,255,0.18) ${pct}%)`;
      this.isPlaying=false; this._syncPlay(); this._drawSparkline();
    });
    $('v3-play').addEventListener('click',()=>{
      this.isPlaying=!this.isPlaying;
      if(this.isPlaying&&this.playIdx>=449) this.playIdx=0;
      this._syncPlay();
    });
    $('v3-speed').addEventListener('click',()=>{
      const i=this.speeds.indexOf(this.speed);
      this.speed=this.speeds[(i+1)%this.speeds.length];
      $('v3-speed').textContent=this.speed+'× SPEED';
    });
    const activeBtn='padding:5px 12px;background:#1F48FF;color:#fff;border:1px solid #1F48FF;font-size:10px;font-weight:bold;letter-spacing:0.1em;cursor:pointer;font-family:inherit';
    const inactiveBtn='padding:5px 12px;background:transparent;color:#676767;border:1px solid #444;font-size:10px;font-weight:bold;letter-spacing:0.1em;cursor:pointer;font-family:inherit';
    $('btn-score').addEventListener('click',()=>{this.colorMode='score';$('btn-score').style.cssText=activeBtn;$('btn-change').style.cssText=inactiveBtn;});
    $('btn-change').addEventListener('click',()=>{this.colorMode='change';$('btn-change').style.cssText=activeBtn;$('btn-score').style.cssText=inactiveBtn;});
    const mount=document.getElementById('v3-canvas');
    mount.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      this.isDragging=true;this.dragFrom={x:e.clientX,y:e.clientY};this.dragDist=0;
      mount.style.cursor='grabbing';
    });
    window.addEventListener('mousemove',e=>{
      if(!this.isDragging)return;
      const dx=e.clientX-this.dragFrom.x,dy=e.clientY-this.dragFrom.y;
      this.dragDist+=Math.hypot(dx,dy);
      const scale=this.camZ/650;
      this.tCamX-=dx*scale; this.tCamY+=dy*scale;
      this.dragFrom={x:e.clientX,y:e.clientY};
    });
    window.addEventListener('mouseup',e=>{
      if(e.button!==0)return;
      if(this.dragDist<5)this._handleClick(e);
      this.isDragging=false; mount.style.cursor='grab';
    });
    mount.addEventListener('wheel',e=>{
      e.preventDefault();
      this.tCamZ=Math.max(3,Math.min(20,this.tCamZ*(e.deltaY>0?1.08:0.93)));
    },{passive:false});
    $('v3-popup-close').addEventListener('click',()=>$('v3-popup').style.display='none');
    $('v3-popup').addEventListener('click',e=>{if(e.target===$('v3-popup'))$('v3-popup').style.display='none';});
    window.addEventListener('resize',()=>this._resize());
  }

  _syncPlay(){document.getElementById('v3-play').textContent=this.isPlaying?'⏸':'▶';}

  _handleClick(e) {
    const el=this.renderer.domElement, rect=el.getBoundingClientRect();
    const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
    this.raycaster.setFromCamera(mouse,this.camera);
    const hits=this.raycaster.intersectObjects(this.clickables,false);
    if(hits.length>0){
      const obj=hits[0].object;
      if(obj.userData.nodeIdx!==undefined){
        const idx=obj.userData.nodeIdx;
        this.nodes[idx].clickStart=this.t; this._showPopup(idx);
      } else if(obj.userData.ghostIdx!==undefined){
        const idx=obj.userData.ghostIdx;
        this.ghosts[idx].clickStart=this.t; this._showGhostPopup(idx);
      }
    }
  }

  _showGhostPopup(idx) {
    const gl=this.ghosts[idx].gl;
    document.getElementById('v3-popup-title').textContent=gl.label.toUpperCase();
    if(gl.i!==undefined){
      const hi=gl.i, habit=this.habits[hi];
      const i0=Math.max(0,Math.min(448,Math.floor(this.dispIdx))), i1=Math.min(449,i0+1), f=this.dispIdx-i0;
      const val=this.weeks[i0].h[hi]+(this.weeks[i1].h[hi]-this.weeks[i0].h[hi])*f;
      const pct=Math.round(val*100);
      const prevVal=this.weeks[Math.max(0,i0-7)].h[hi];
      const diff=pct-Math.round(prevVal*100);
      const col=diff>0?'#00cc66':diff<0?'#ff4466':'#676767';
      document.getElementById('v3-popup-score').innerHTML=`
        <div style="font-size:13px;letter-spacing:0.15em;color:#676767;margin-bottom:14px">↳ ${habit.full.toUpperCase()}</div>
        <div style="display:flex;align-items:baseline;gap:18px">
          <div style="font-size:56px;font-weight:bold;color:#1F48FF;line-height:1">${pct}%</div>
          <div style="font-size:17px;color:${col};font-weight:bold">${diff>=0?'+':''}${diff}% vs prior week</div>
        </div>`;
      document.getElementById('v3-popup-chart').innerHTML=this._buildChartSVG(hi);
    } else {
      document.getElementById('v3-popup-score').innerHTML=`<div style="font-size:13px;color:#676767;padding:8px 0">Behavioural marker — no independent score tracked.</div>`;
      document.getElementById('v3-popup-chart').innerHTML='';
    }
    document.getElementById('v3-popup').style.display='flex';
  }

  _showPopup(idx) {
    const hi=this.nodes[idx].hl.i;
    const habit=this.habits[hi];
    const i0=Math.max(0,Math.min(448,Math.floor(this.dispIdx))), i1=Math.min(449,i0+1), f=this.dispIdx-i0;
    const val=this.weeks[i0].h[hi]+(this.weeks[i1].h[hi]-this.weeks[i0].h[hi])*f;
    const pct=Math.round(val*100);
    const prevVal=this.weeks[Math.max(0,i0-7)].h[hi];
    const diff=pct-Math.round(prevVal*100);
    const col=diff>0?'#00cc66':diff<0?'#ff4466':'#676767';
    document.getElementById('v3-popup-title').textContent=habit.full.toUpperCase();
    document.getElementById('v3-popup-score').innerHTML=`<div style="display:flex;align-items:baseline;gap:18px"><div style="font-size:56px;font-weight:bold;color:#1F48FF;line-height:1">${pct}%</div><div style="font-size:13px;color:${col};font-weight:bold">${diff>=0?'+':''}${diff}% vs prior week</div></div>`;
    document.getElementById('v3-popup-chart').innerHTML=this._buildChartSVG(hi);
    document.getElementById('v3-popup').style.display='flex';
  }

  _buildChartSVG(idx) {
    const endI=Math.min(449,Math.round(this.dispIdx));
    const W=360,H=165,ml=32,mr=10,mt=10,mb=22,cw=W-ml-mr,ch=H-mt-mb;
    const vals=this.weeks.slice(0,endI+1).map(wk=>wk.h[idx]);
    const N=vals.length; if(N<2)return '';
    const win=30;
    const mavg=vals.map((_,i)=>{let s=0,cnt=0;for(let j=Math.max(0,i-win);j<=Math.min(N-1,i+win);j++){s+=vals[j];cnt++;}return s/cnt;});
    const xf=i=>ml+(i/(N-1))*cw, yf=v=>mt+(1-v)*ch;
    let yrTicks='';
    for(let yr=2018;yr<=2027;yr++){
      const tgt=`${yr}-01-01`;
      for(let i=0;i<=endI&&i<this.weeks.length;i++){
        if(this.weeks[i].date>=tgt){const ix=xf(i);yrTicks+=`<line x1="${ix.toFixed(1)}" y1="${mt}" x2="${ix.toFixed(1)}" y2="${mt+ch}" stroke="#1e1e1e" stroke-width="1"/><text x="${ix.toFixed(1)}" y="${mt+ch+14}" text-anchor="middle" fill="#555" font-size="9">${yr}</text>`;break;}
      }
    }
    const dotParts=[];
    for(let i=0;i<N;i++)dotParts.push(`<circle cx="${xf(i).toFixed(1)}" cy="${yf(vals[i]).toFixed(1)}" r="1.4" fill="#aaa" opacity="0.32"/>`);
    const pathParts=[`M${xf(0).toFixed(1)},${yf(mavg[0]).toFixed(1)}`];
    for(let i=1;i<N;i++)pathParts.push(`L${xf(i).toFixed(1)},${yf(mavg[i]).toFixed(1)}`);
    const ex=xf(N-1),ey=yf(mavg[N-1]),epct=Math.round(mavg[N-1]*100);
    const dc=epct>60?'#00cc66':epct>30?'#1F48FF':'#ff4466';
    const lblX=ex>cw*0.8+ml?ex-8:ex+8,lblA=ex>cw*0.8+ml?'end':'start';
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><rect width="${W}" height="${H}" fill="#0a0a0a"/><line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ch}" stroke="#333" stroke-width="0.5"/><line x1="${ml}" y1="${mt+ch}" x2="${ml+cw}" y2="${mt+ch}" stroke="#333" stroke-width="0.5"/><text x="${ml-4}" y="${mt+6}" text-anchor="end" fill="#555" font-size="9">100%</text><text x="${ml-4}" y="${mt+ch+1}" text-anchor="end" fill="#555" font-size="9">0%</text>${yrTicks}${dotParts.join('')}<path d="${pathParts.join('')}" fill="none" stroke="#00cc66" stroke-width="1.5" stroke-linejoin="round"/><circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="4" fill="${dc}" stroke="#0a0a0a" stroke-width="1.5"/><text x="${lblX.toFixed(1)}" y="${(ey-7).toFixed(1)}" text-anchor="${lblA}" fill="${dc}" font-size="10" font-weight="bold">${epct}%</text></svg>`;
  }

  // ============ SPARKLINE ============

  _drawSparkline() {
    const canvas=document.getElementById('v3-spark');
    if(!canvas||!this.weeks)return;
    const dpr=window.devicePixelRatio||1, W=canvas.clientWidth||600, H=canvas.clientHeight||44;
    canvas.width=Math.round(W*dpr); canvas.height=Math.round(H*dpr);
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    const N=this.weeks.length,xf=i=>(i/(N-1))*W,yf=v=>H-3-v*(H-6);
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(31,72,255,0.35)');grad.addColorStop(1,'rgba(31,72,255,0.03)');
    ctx.beginPath();ctx.moveTo(0,H);
    for(let i=0;i<N;i++)ctx.lineTo(xf(i),yf(this.weeks[i].w));
    ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();
    for(let i=0;i<N;i++){const x=xf(i),y=yf(this.weeks[i].w);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.strokeStyle='rgba(31,72,255,0.75)';ctx.lineWidth=1.5;ctx.stroke();
    const ci=Math.max(0,Math.min(449,Math.round(this.dispIdx)));
    const cx2=xf(ci);
    ctx.beginPath();ctx.moveTo(cx2,0);ctx.lineTo(cx2,H);
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(cx2,yf(this.weeks[ci].w),3.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  }

  // ============ ANIMATION LOOP ============

  _loop() {
    this._raf=requestAnimationFrame(()=>this._loop());
    const now=performance.now(),dt=Math.min((now-this.lastT)/1000,0.05);
    this.lastT=now;this.t+=dt;
    if(this.isPlaying){
      this.playIdx=Math.min(449,this.playIdx+dt*5.5*this.speed);
      const tlEl=document.getElementById('v3-tl');
      tlEl.value=Math.round(this.playIdx);
      const pct=(this.playIdx/449)*100;
      tlEl.style.background=`linear-gradient(to right,rgba(31,72,255,0.6) ${pct}%,rgba(31,72,255,0.18) ${pct}%)`;
      if(this.playIdx>=449){this.playIdx=449;this.isPlaying=false;this._syncPlay();}
      this._drawSparkline();
    }
    this.dispIdx+=(this.playIdx-this.dispIdx)*Math.min(1,dt*5);
    // Smooth camera with easing
    const ease=0.11;
    this.camX+=(this.tCamX-this.camX)*ease;
    this.camY+=(this.tCamY-this.camY)*ease;
    this.camZ+=(this.tCamZ-this.camZ)*ease;
    this.camera.position.set(this.camX,this.camY,this.camZ);
    this.camera.lookAt(this.camX,this.camY,0);
    // Data
    const i0=Math.max(0,Math.min(448,Math.floor(this.dispIdx))),i1=Math.min(449,i0+1),f=this.dispIdx-i0;
    const w=this.weeks[i0].w+(this.weeks[i1].w-this.weeks[i0].w)*f;
    const hv=this.habits.map((_,k)=>this.weeks[i0].h[k]+(this.weeks[i1].h[k]-this.weeks[i0].h[k])*f);
    const hp=this.habits.map((_,k)=>this.weeks[Math.max(0,i0-7)].h[k]);
    const mom=w-this.weeks[Math.max(0,i0-1)].w;
    this._updateScene(w,mom,hv,hp);
    this._updateReadout(this.dispIdx,w,mom,this.weeks[i0].date);
    this._drawAnnotations();
    this.composer.render();
  }

  _orbColor(val,prevVal){
    if(this.colorMode==='score') return new THREE.Color().setHSL(val*0.75,1,0.54);
    const ch=val-prevVal,t2=Math.max(0,Math.min(1,(ch+0.25)/0.5));
    return new THREE.Color().setHSL(t2*0.35,0.9,0.5);
  }

  _stateColors(w,mom){
    if(mom>0.012)return{a:new THREE.Color(0x06251c),b:new THREE.Color(0x00ff88),rim:new THREE.Color(0x7dffc0)};
    if(mom<-0.012)return{a:new THREE.Color(0x2a0512),b:new THREE.Color(0xff0055),rim:new THREE.Color(0xff6b97)};
    return{a:new THREE.Color(0x0a1a4a),b:new THREE.Color(0x1F48FF),rim:new THREE.Color(0x6f9bff)};
  }

  _updateScene(w,mom,hv,hp){
    const t=this.t,c=this._stateColors(w,mom);
    this.coreU.uTime.value=t;
    this.coreU.uInflate.value+=(0.88+w*0.72-this.coreU.uInflate.value)*0.06;
    this.coreU.uTurb.value+=(0.18+Math.abs(mom)*5+(1-w)*0.18-this.coreU.uTurb.value)*0.06;
    this.coreU.uSpike.value+=(Math.max(0,-mom)*6-this.coreU.uSpike.value)*0.06;
    this.coreU.uColA.value.lerp(c.a,.05);this.coreU.uColB.value.lerp(c.b,.05);this.coreU.uRim.value.lerp(c.rim,.05);
    this.coreGrp.rotation.y+=(0.045+Math.abs(mom))*0.016;
    this.coreGrp.rotation.x=Math.sin(t*0.1)*0.1;
    this.wireMesh.rotation.y-=0.003;this.wireMesh.scale.setScalar(this.coreU.uInflate.value*0.62);
    this.nodes.forEach((nd,k)=>{
      const hi=nd.hl.i,b=nd.hl.b,s=nd.seed,isC=(nd.hl.g==='dopamine'||nd.hl.g==='wellness'),da=isC?0.26:0.04;
      nd.mesh.position.set(b.x+Math.sin(t*0.35+s*2.1)*da,b.y+Math.cos(t*0.28+s*1.6)*da,b.z+Math.sin(t*0.5+s*3.0)*da*0.4);
      const age=t-nd.clickStart,bounce=(age!=null&&age>=0&&age<0.45)?1+Math.sin(age/0.45*Math.PI)*0.65:1;
      nd.mesh.scale.setScalar((0.45+hv[hi]*1.0)*bounce);
      // Glow tracks mesh but scales more gently — prevents overlap at high scores
      nd.glow.position.copy(nd.mesh.position);
      nd.glow.scale.setScalar((0.55+hv[hi]*0.42)*bounce);
      const col=this._orbColor(hv[hi],hp[hi]);
      nd.mat.color.lerp(col,0.1);nd.gmat.color.copy(nd.mat.color);nd.gmat.opacity=0.07+hv[hi]*0.17;
    });
    this.ghosts.forEach(gn=>{
      const b=gn.gl.b,s=gn.seed,isD=(gn.gl.g==='dopamine'||gn.gl.g==='wellness'),da=isD?0.22:0.02;
      gn.mesh.position.set(b.x+Math.sin(t*0.3+s*2.4)*da,b.y+Math.cos(t*0.25+s*1.8)*da,b.z+Math.sin(t*0.42+s*3.1)*da*0.4);
      const gage=t-gn.clickStart,gbounce=(gage>=0&&gage<0.45)?1+Math.sin(gage/0.45*Math.PI)*0.65:1;
      if(gn.gl.i!==undefined){
        const gi=gn.gl.i,gv=hv[gi],gp=hp[gi];
        const col=this._orbColor(gv,gp);
        gn.mat.color.lerp(col,0.1);
        gn.gmat.color.copy(gn.mat.color);
        gn.gmat.opacity=0.05+gv*0.14;
        gn.mesh.scale.setScalar((0.35+gv*0.7)*gbounce);
        gn.glow.scale.setScalar((0.45+gv*0.32)*gbounce);
      } else {
        if(gn.gmat)gn.gmat.opacity=0.05+Math.sin(t*0.7+s)*0.04;
        gn.mesh.scale.setScalar(gbounce);
        gn.glow.scale.setScalar(gbounce*0.85);
      }
      gn.glow.position.copy(gn.mesh.position);
    });
    for(let i=0;i<this.pSeed.length;i++){
      const bx=this.pBase[i*3],by=this.pBase[i*3+1],bz=this.pBase[i*3+2],s=this.pSeed[i];
      const ang=t*0.18*(0.3+(s%10)/20);
      this.pPos[i*3]=bx*Math.cos(ang)-bz*Math.sin(ang);this.pPos[i*3+1]=by+Math.sin(t*0.35+s)*0.18;this.pPos[i*3+2]=bx*Math.sin(ang)+bz*Math.cos(ang);
    }
    this.particles.geometry.attributes.position.needsUpdate=true;
    this.particles.rotation.y+=0.0003;this.pMat.color.lerp(c.b,0.04);
    this.bloom.strength+=(0.55+w*0.75-this.bloom.strength)*0.04;
  }

  // ============ ANNOTATIONS ============

  _proj(v3){const v=v3.clone();v.project(this.camera);return{x:(v.x+1)/2*this.RW,y:(-v.y+1)/2*this.RH};}

  _drawAnnotations(){
    const ctx=this.annotCtx; ctx.clearRect(0,0,this.W,this.H); ctx.save();
    // Zoom-responsive scale: text grows as camera zooms in, stays readable at any depth
    const zf=Math.sqrt(9/Math.max(3,this.camZ));
    // Cluster circles
    this._drawCluster(ctx,-3.25,2.2,1.05,'DOPAMINE');
    this._drawCluster(ctx, 3.25,2.2,1.05,'WELLNESS');
    // Stack labels
    ctx.font=`bold ${Math.round(11*zf)}px FreeSans,sans-serif`;ctx.fillStyle='rgba(255,255,255,0.82)';ctx.textAlign='center';
    [[-3.4,1.15,'HOUSEKEEPING'],[3.55,1.15,'OUTPUT'],[0,-1.45,'ENLIGHTENMENT']].forEach(([x,y,lbl])=>{
      const p=this._proj(new THREE.Vector3(x,y,0));ctx.fillText(lbl,p.x,p.y);
    });
    // Orb labels (tracked)
    const nodeLFS=Math.round(13*zf);
    this.nodes.forEach((nd,k)=>{
      const p=this._proj(nd.mesh.position);
      const sc=nd.mesh.scale.x;
      ctx.font=`bold ${nodeLFS}px FreeSans,sans-serif`;ctx.fillStyle='rgba(255,255,255,0.93)';ctx.textAlign='center';
      ctx.fillText(this.habits[nd.hl.i].label,p.x,p.y+sc*20+15);
    });
    // Ghost labels
    const ghostLFS=Math.round(11*zf);
    this.ghosts.forEach(gn=>{
      const p=this._proj(gn.mesh.position);
      ctx.font=`${ghostLFS}px FreeSans,sans-serif`;ctx.fillStyle='rgba(255,255,255,0.62)';ctx.textAlign='center';
      ctx.fillText(gn.gl.label,p.x,p.y+16);
    });
    // Stack structure arrows
    this._drawHKArrows(ctx);
    this._drawOutputArrows(ctx);
    this._drawEnlArrows(ctx);
    ctx.restore();
  }

  _drawCluster(ctx,cx,cy,r,lbl){
    const center=this._proj(new THREE.Vector3(cx,cy,0));
    const edge=this._proj(new THREE.Vector3(cx+r,cy,0));
    const rad=Math.abs(edge.x-center.x);
    ctx.beginPath();ctx.arc(center.x,center.y,rad,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    const zf=Math.sqrt(9/Math.max(3,this.camZ));
    ctx.font=`bold ${Math.round(11*zf)}px FreeSans,sans-serif`;ctx.fillStyle='rgba(255,255,255,0.82)';ctx.textAlign='center';
    ctx.fillText(lbl,center.x,center.y-rad-9);
  }

  _drawHKArrows(ctx){
    // Row: TIDINESS(-4.0), 9.30(-3.6), 1PFS(-3.2), SLEEP(-2.8) all y=0.45
    const p1=this._proj(new THREE.Vector3(-4.0,0.45,0));
    const p4=this._proj(new THREE.Vector3(-2.8,0.45,0));
    const mid=this._proj(new THREE.Vector3(-3.4,0.45,0));
    const dil=this._proj(new THREE.Vector3(-3.4,-0.42,0));
    const ptd=this._proj(new THREE.Vector3(-3.4,-1.15,0));
    const bY=Math.max(p1.y,p4.y)+16;
    ctx.strokeStyle='rgba(255,255,255,0.52)';ctx.lineWidth=1.5;ctx.setLineDash([]);
    // Bracket
    ctx.beginPath();
    ctx.moveTo(p1.x-8,p1.y-12);ctx.lineTo(p1.x-8,bY);ctx.lineTo(p4.x+8,bY);ctx.lineTo(p4.x+8,p4.y-12);
    ctx.stroke();
    // Bracket → Diligencia
    const a1b=dil.y-18;
    if(a1b>bY+2){ctx.beginPath();ctx.moveTo(mid.x,bY+2);ctx.lineTo(mid.x,a1b);ctx.stroke();this._arrowHead(ctx,mid.x,a1b);}
    // Diligencia → Plan the Day
    const a2t=dil.y+18,a2b=ptd.y-18;
    if(a2b>a2t){ctx.beginPath();ctx.moveTo(dil.x,a2t);ctx.lineTo(dil.x,a2b);ctx.stroke();this._arrowHead(ctx,dil.x,a2b);}
  }

  _drawOutputArrows(ctx){
    // Horizontal row: Reading(2.7), Create(3.55), Social(4.4) at y=0.5
    // Arrow from Create bracket centre down to RDH(3.55,-0.65)
    const pr=this._proj(new THREE.Vector3(2.7,0.5,0));
    const pc=this._proj(new THREE.Vector3(3.55,0.5,0));
    const ps=this._proj(new THREE.Vector3(4.4,0.5,0));
    const prdh=this._proj(new THREE.Vector3(3.55,-0.65,0));
    const bY=Math.max(pr.y,pc.y,ps.y)+16;
    ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=1.5;ctx.setLineDash([]);
    // Bracket under row
    ctx.beginPath();
    ctx.moveTo(pr.x-10,pr.y-12);ctx.lineTo(pr.x-10,bY);
    ctx.lineTo(ps.x+10,bY);ctx.lineTo(ps.x+10,ps.y-12);
    ctx.stroke();
    // Arrow bracket midpoint → RDH
    const ab=prdh.y-16;
    if(ab>bY+2){ctx.beginPath();ctx.moveTo(pc.x,bY+2);ctx.lineTo(pc.x,ab);ctx.stroke();this._arrowHead(ctx,pc.x,ab);}
  }

  _drawEnlArrows(ctx){
    const pts=[[0,-2.1],[0,-2.75],[0,-3.4]].map(([x,y])=>this._proj(new THREE.Vector3(x,y,0)));
    ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=1.5;
    for(let i=0;i<pts.length-1;i++){
      const top=pts[i].y+17,bot=pts[i+1].y-17;
      if(bot>top){ctx.beginPath();ctx.moveTo(pts[i].x,top);ctx.lineTo(pts[i].x,bot);ctx.stroke();this._arrowHead(ctx,pts[i].x,bot);}
    }
  }

  _arrowHead(ctx,x,y){
    const sz=6;ctx.beginPath();
    ctx.moveTo(x-sz,y-sz);ctx.lineTo(x,y);ctx.lineTo(x+sz,y-sz);
    ctx.stroke();
  }

  _updateReadout(idx,w,mom,date){
    const $=id=>document.getElementById(id);
    const vit=$('v3-vit');if(vit)vit.textContent=Math.round(w*100)+'%';
    const md=$('v3-mom');
    if(md){const p=mom*100,up=p>=0;md.textContent=(up?'▲ +':'▼ ')+p.toFixed(1);md.style.color=Math.abs(p)<1.2?'#1F48FF':up?'#00ff88':'#ff3355';}
    const dd=$('v3-date');if(dd)dd.textContent='WEEK OF '+date;
    const tl=$('v3-wklabel');if(tl)tl.textContent='WEEK '+(Math.round(idx)+1)+' / 450';
  }

  _resize(){
    if(!this.renderer)return;
    const mount=document.getElementById('v3-canvas');
    this.RW=mount.clientWidth||window.innerWidth;
    this.RH=mount.clientHeight||window.innerHeight;
    this.camera.aspect=this.RW/this.RH;this.camera.updateProjectionMatrix();
    this.renderer.setSize(this.RW,this.RH);this.composer.setSize(this.RW,this.RH);this.bloom.setSize(this.RW,this.RH);
    const dpr=window.devicePixelRatio||1;
    this.annot.width=this.RW*dpr;this.annot.height=this.RH*dpr;
    this.annot.style.width=this.RW+'px';this.annot.style.height=this.RH+'px';
    this.annotCtx=this.annot.getContext('2d');this.annotCtx.scale(dpr,dpr);
    this._drawSparkline();
  }

  componentWillUnmount(){cancelAnimationFrame(this._raf);}
  renderVals(){return{};}
}
</script>
</body>
</html>
